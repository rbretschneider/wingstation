{{define "navbar"}}
<nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-14 sm:h-16">
            <div class="flex items-center space-x-2 sm:space-x-3 min-w-0">
                <a href="/" class="flex items-center space-x-2 shrink-0">
                    <svg class="w-7 h-7 sm:w-8 sm:h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/>
                    </svg>
                    <span class="text-lg sm:text-xl font-bold text-gray-900 dark:text-white">WingStation</span>
                </a>
            </div>
            <div class="flex items-center gap-1 sm:gap-4">
                <a href="/" class="px-2 sm:px-3 py-2 text-xs sm:text-sm font-medium {{if eq .Page "dashboard"}}text-blue-600 dark:text-blue-400 font-semibold{{else}}text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white{{end}}">
                    <svg class="w-5 h-5 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                    </svg>
                    <span class="hidden sm:inline">Dashboard</span>
                </a>
                <a href="/host" class="px-2 sm:px-3 py-2 text-xs sm:text-sm font-medium {{if eq .Page "host"}}text-blue-600 dark:text-blue-400 font-semibold{{else}}text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white{{end}}">
                    <svg class="w-5 h-5 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <span class="hidden sm:inline">Host Info</span>
                </a>
                <!-- Dark mode toggle -->
                <button @click="
                    if (document.documentElement.classList.contains('dark')) {
                        document.documentElement.classList.remove('dark');
                        localStorage.theme = 'light';
                    } else {
                        document.documentElement.classList.add('dark');
                        localStorage.theme = 'dark';
                    }
                " class="p-1.5 sm:p-2 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 rounded-lg">
                    <!-- Sun icon (shown in dark mode) -->
                    <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <!-- Moon icon (shown in light mode) -->
                    <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
                <div class="flex items-center space-x-1 text-xs"
                     :class="$store.app.sseConnected ? 'text-green-500' : 'text-red-500'">
                    <span class="w-2 h-2 rounded-full"
                          :class="$store.app.sseConnected ? 'bg-green-500' : 'bg-red-500'"></span>
                    <span class="hidden sm:inline" x-text="$store.app.sseConnected ? 'Live' : 'Disconnected'"></span>
                </div>
            </div>
        </div>
    </div>
</nav>
{{end}}
